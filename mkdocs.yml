# Python 学习知识库 - MkDocs 配置
site_name: Python 学习知识库
site_description: Python 系统学习知识库
site_author: Python Learning Guide
site_url: ""
docs_dir: "docs"

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono

nav:
  - 首页: index.md

plugins:
  - search:
      lang: [zh, en]
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

copyright: Copyright &copy; 2025 Python 学习知识库
