plugins:
  - search:
      lang: [zh, en]
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

extra:
  analytics:
    provider: google
    property: G-YQB1YRXLFN

copyright: Copyright &copy; 2025 Python 学习知识库
